name: Sync Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        shell: bash
        run: |
          set -euo pipefail
          git remote remove upstream 2>/dev/null || true
          git remote add upstream https://github.com/WEP-56/EZVenera.git
          git fetch upstream main

      - name: Merge upstream/main into main
        shell: bash
        run: |
          set -euo pipefail
          git checkout main
          git merge --no-edit upstream/main

      - name: Push changes
        shell: bash
        run: |
          set -euo pipefail
          git push origin main
